<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소하중학교 정보 발표 체크리스트</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>

body{
font-family:'Jua', sans-serif;
background:#f4f9ff;
text-align:center;
margin:0;
}

h1{
font-size:48px;
color:#ff6b6b;
margin-top:30px;
}

#upload{
margin:20px;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
}

td{
padding:12px;
font-size:20px;
}

.student{
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
padding:8px;
border-radius:15px;
transition:0.2s;
}

.student:hover{
background:#ffeaa7;
transform:scale(1.03);
}

.avatar{
width:40px;
height:40px;
border-radius:50%;
}

.count{
color:#0984e3;
font-size:18px;
margin-left:10px;
}

</style>
</head>

<body>

<h1>소하중학교 정보 발표 체크리스트</h1>

<input type="file" id="upload" accept=".csv">

<table id="table"></table>

<button onclick="downloadCSV()">저장하기</button>

<script>

let students=[]
let className=""

const avatars=[]

// 30개의 귀여운 캐릭터 생성
for(let i=1;i<=30;i++){
avatars.push(`https://api.dicebear.com/7.x/adventurer/svg?seed=${i}`)
}

document.getElementById("upload").addEventListener("change", function(e){

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=function(){

let rows=reader.result.split("\n").slice(1)

students=[]

rows.forEach((row,i)=>{

let cols=row.split(",")

if(cols.length<5)return

let student={
class:cols[0],
number:cols[1],
name:cols[2],
count:parseInt(cols[3])||0,
gender:cols[4],
avatar:avatars[i%30]
}

className=cols[0]

students.push(student)

})

render()

localStorage.setItem("students",JSON.stringify(students))

}

reader.readAsText(file,"utf-8")

})

function render(){

const table=document.getElementById("table")

table.innerHTML=""

students.forEach((s,i)=>{

let tr=document.createElement("tr")

let td=document.createElement("td")

td.innerHTML=`

<div class="student" onclick="addCount(${i})">

<img class="avatar" src="${s.avatar}">

${s.number}번 ${s.name}

<span class="count">발표 ${s.count}</span>

</div>

`

tr.appendChild(td)

table.appendChild(tr)

})

}

function addCount(i){

students[i].count++

render()

localStorage.setItem("students",JSON.stringify(students))

}

window.onload=function(){

let saved=localStorage.getItem("students")

if(saved){

students=JSON.parse(saved)

render()

}

}

window.onbeforeunload=function(){

return "저장하시겠습니까?"

}

function downloadCSV(){

let csv="반,번호,이름,발표횟수,성별\n"

students.forEach(s=>{

csv+=`${s.class},${s.number},${s.name},${s.count},${s.gender}\n`

})

let blob=new Blob([csv],{type:"text/csv"})

let link=document.createElement("a")

let date=new Date().toISOString().slice(0,10)

link.download=`${className}_${date}.csv`

link.href=URL.createObjectURL(blob)

link.click()

}

</script>

</body>
</html>
