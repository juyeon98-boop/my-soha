<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>소하중 발표 관리</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6fb;margin:0;padding:20px;text-align:center}
h1{margin-bottom:5px}
p{margin-top:0;color:#555}

#upload{margin:15px;padding:10px 16px;font-size:15px}

#top3{display:flex;justify-content:center;gap:20px;margin:20px 0;flex-wrap:wrap}
.topCard{background:white;padding:12px 18px;border-radius:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08);font-weight:bold}

#grid{margin:auto;max-width:1000px;display:grid;grid-template-columns:repeat(8,1fr);gap:16px}

.card{cursor:pointer;padding:10px;border-radius:14px;background:white;box-shadow:0 4px 10px rgba(0,0,0,0.08);transition:transform 0.15s}
.card:hover{transform:scale(1.05)}

.avatar{width:70px;height:70px;border-radius:50%;margin:auto;margin-bottom:6px;object-fit:cover}

.name{font-weight:bold}
.meta{font-size:12px;color:#666}
.count{margin-top:4px;font-weight:bold}

#chart{margin:40px auto;max-width:900px;background:white;padding:20px;border-radius:14px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
.bar{height:20px;background:#6c8cff;margin:6px 0;border-radius:6px}
.barLabel{font-size:13px;text-align:left}

button{margin-top:15px;padding:8px 14px;border:none;border-radius:8px;background:#4a6cf7;color:white;cursor:pointer}
button:hover{opacity:0.9}

@media(max-width:800px){
#grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>
<body>

<h1>소하중학교 발표 관리</h1>
<p>CSV 형식 : 반,번호,이름,횟수,성별</p>

<input type="file" id="upload" accept=".csv" />
<br>
<button onclick="downloadCSV()">발표 기록 CSV 다운로드</button>

<div id="top3"></div>

<div id="grid"></div>

<div id="chart">
<h3>발표 횟수 그래프</h3>
<div id="bars"></div>
</div>

<script>

const girlAvatars=[
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl1",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl2",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl3",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl4",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl5",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl6",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl7",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl8",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl9",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl10",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl11",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl12",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl13",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl14",
"https://api.dicebear.com/7.x/adventurer/svg?seed=girl15"
];

const boyAvatars=[
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy1",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy2",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy3",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy4",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy5",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy6",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy7",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy8",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy9",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy10",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy11",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy12",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy13",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy14",
"https://api.dicebear.com/7.x/adventurer/svg?seed=boy15"
];

const grid=document.getElementById("grid");
const bars=document.getElementById("bars");
const top3Div=document.getElementById("top3");

let students=[];

/* CSV 업로드 */

document.getElementById("upload").addEventListener("change",function(e){

const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(event){

const text=event.target.result;

// 줄바꿈 호환 (윈도우/맥)
let rows = text.trim().split(/\r?\n/);

// 헤더 제거 (첫 줄이 '반,번호,이름,횟수,성별' 인 경우)
if(rows[0].includes("반") && rows[0].includes("이름")){
rows = rows.slice(1);
}

students=rows.map(r=>{

// 공백 및 CR 제거
r = r.replace(/
/g,"");

let [cls,num,name,count,gender]=r.split(",");

let id=cls.trim()+"-"+num.trim()+"-"+name.trim();
let saved=localStorage.getItem(id);

return{
class:cls.trim(),
number:num.trim(),
name:name.trim(),
count:saved?parseInt(saved):parseInt(count)||0,
gender:gender.trim(),
id:id
};

});

updateAll();

};

reader.readAsText(file);

});

function updateAll(){
render();
renderTop3();
renderChart();
}

function render(){

students.sort((a,b)=>b.count-a.count);

grid.innerHTML="";

for(let i=0;i<32;i++){

if(i<students.length){

let s=students[i];

let avatar;

if(s.gender=="여"||s.gender.toLowerCase()=="f"){
avatar=girlAvatars[i%girlAvatars.length];
}else{
avatar=boyAvatars[i%boyAvatars.length];
}

let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img class="avatar" src="${avatar}">
<div class="name">${s.name}</div>
<div class="meta">${s.class}반 ${s.number}번</div>
<div class="count">${s.count}회</div>
`;

card.addEventListener("click",()=>{

s.count++;
localStorage.setItem(s.id,s.count);
updateAll();

});

grid.appendChild(card);

}else{
let empty=document.createElement("div");
empty.style.visibility="hidden";
grid.appendChild(empty);
}

}

}

function renderTop3(){

let sorted=[...students].sort((a,b)=>b.count-a.count).slice(0,3);

top3Div.innerHTML="";

sorted.forEach((s,i)=>{
let div=document.createElement("div");
div.className="topCard";
div.innerText=`🏆 ${i+1}위 ${s.name} (${s.count}회)`;
top3Div.appendChild(div);
});

}

function renderChart(){

bars.innerHTML="";

let max=Math.max(...students.map(s=>s.count),1);

students.slice(0,10).forEach(s=>{

let label=document.createElement("div");
label.className="barLabel";
label.innerText=s.name+" ("+s.count+")";

let bar=document.createElement("div");
bar.className="bar";
bar.style.width=(s.count/max*100)+"%";

bars.appendChild(label);
bars.appendChild(bar);

});

}

function downloadCSV(){

let rows=["반,번호,이름,횟수,성별"];

students.forEach(s=>{
rows.push(`${s.class},${s.number},${s.name},${s.count},${s.gender}`);
});

let blob=new Blob([rows.join("\n")],{type:"text/csv"});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="presentation_counts.csv";
a.click();

}

</script>

</body>
</html>
