<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>소하중학교 정보 발표 체크리스트</title>

<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

<style>

body{
font-family:'Jua',sans-serif;
background:#f2f8ff;
text-align:center;
margin:0;
}

h1{
font-size:48px;
color:#ff6b6b;
margin-top:20px;
}

#upload{
margin:15px;
font-size:16px;
}

#grid{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(4,120px);
gap:10px;
}

.card{

background:white;
border-radius:20px;
padding:10px;
cursor:pointer;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

transition:0.2s;
}

.card:hover{
transform:scale(1.05);
background:#ffeaa7;
}

.avatar{
width:60px;
height:60px;
border-radius:50%;
margin-bottom:5px;
}

.name{
font-size:18px;
}

.count{
color:#0984e3;
font-size:16px;
}

/* TOP3 효과 */

.top{
animation:glow 1.5s infinite alternate;
}

@keyframes glow{
from{
box-shadow:0 0 10px #ffd700;
}
to{
box-shadow:0 0 25px #ffd700;
}
}

</style>
</head>

<body>

<h1>소하중학교 정보 발표 체크리스트</h1>

<input type="file" id="upload" accept=".csv">

<div id="grid"></div>

<button onclick="downloadCSV()">저장하기</button>

<script>

let students=[]
let className=""

const maleAvatars=[]
const femaleAvatars=[]

/* 원피스 느낌 해적 캐릭터 생성 */

for(let i=1;i<=30;i++){

maleAvatars.push(`https://api.dicebear.com/7.x/adventurer/svg?seed=pirateboy${i}`)

femaleAvatars.push(`https://api.dicebear.com/7.x/adventurer/svg?seed=pirategirl${i}`)

}

document.getElementById("upload").addEventListener("change",function(e){

const file=e.target.files[0]
const reader=new FileReader()

reader.onload=function(){

const text=reader.result.trim()

originalRows=text.split(/\r?\n/)   // 원본 구조 저장

let rows=originalRows.slice(1)

students=[]

rows.forEach((row,i)=>{

let c=row.split(",")

if(c.length<5)return

let gender=c[4].trim()

let avatar=gender==="여"
? femaleAvatars[i%30]
: maleAvatars[i%30]

students.push({

class:c[0],
number:c[1],
name:c[2],
count:parseInt(c[3])||0,
gender:gender,
avatar:avatar

})

className=c[0]

})

render()

}

reader.readAsText(file,"utf-8")

})
function render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

/* TOP3 계산 */

let sorted=[...students].sort((a,b)=>b.count-a.count)

let top3=sorted.slice(0,3).map(s=>s.name)

students.slice(0,32).forEach((s,i)=>{

let div=document.createElement("div")

div.className="card"

if(top3.includes(s.name) && s.count>0){

div.classList.add("top")

}

div.onclick=()=>addCount(i)

div.innerHTML=`

<img class="avatar" src="${s.avatar}">

<div class="name">${s.number}번 ${s.name}</div>

<div class="count">발표 ${s.count}</div>

`

grid.appendChild(div)

})

}

function addCount(i){

students[i].count++

render()

localStorage.setItem("students",JSON.stringify(students))

}

window.onload=function(){

let saved=localStorage.getItem("students")

if(saved){

students=JSON.parse(saved)

render()

}

}

window.onbeforeunload=function(){

return "변경사항을 저장하시겠습니까?"

}

function downloadCSV(){

let newRows=[]

/* 헤더 그대로 유지 */
newRows.push(originalRows[0])

students.forEach((s,i)=>{

let cols=originalRows[i+1].split(",")

/* 발표횟수(4번째 열)만 수정 */
cols[3]=s.count

newRows.push(cols.join(","))

})

let csv=newRows.join("\n")

/* UTF-8 BOM 추가 → Excel 한글 깨짐 방지 */
let blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"})

let link=document.createElement("a")

let today=new Date()

let yy=String(today.getFullYear()).slice(2)
let mm=String(today.getMonth()+1).padStart(2,"0")
let dd=String(today.getDate()).padStart(2,"0")

let date=yy+mm+dd

link.download=`${className}_${date}.csv`

link.href=URL.createObjectURL(blob)

link.click()

}

</script>

</body>
</html>
