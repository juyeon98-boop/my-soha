<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>소하중 발표 횟수 체크</title>
<style>
body{
font-family: Arial, sans-serif;
background:#f2f5fb;
margin:0;
padding:30px;
text-align:center;
}

h1{
margin-bottom:10px;
}

#upload{
margin:20px;
padding:10px 16px;
font-size:16px;
}

#grid{
margin:auto;
max-width:900px;
display:grid;
grid-template-columns:repeat(8,1fr);
grid-template-rows:repeat(4,1fr);
gap:20px;
}

.card{
cursor:pointer;
padding:10px;
border-radius:12px;
background:white;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
transition:transform 0.15s;
}

.card:hover{
transform:scale(1.05);
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
margin:auto;
margin-bottom:6px;
object-fit:cover;
}

.name{
font-weight:bold;
}

.count{
color:#444;
}

.empty{
visibility:hidden;
}
</style>
</head>
<body>

<h1>소하중학교 발표 횟수 체크</h1>
<p>CSV 파일을 업로드하면 학생 목록이 나타납니다. (형식: 이름,횟수)</p>

<input type="file" id="upload" accept=".csv" />

<div id="grid"></div>

<script>

const girlAvatars = [
"https://api.dicebear.com/7.x/adventurer/svg?seed=g1",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g2",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g3",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g4",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g5",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g6",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g7",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g8",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g9",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g10",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g11",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g12",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g13",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g14",
"https://api.dicebear.com/7.x/adventurer/svg?seed=g15"
];

const boyAvatars = [
"https://api.dicebear.com/7.x/adventurer/svg?seed=b1",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b2",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b3",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b4",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b5",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b6",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b7",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b8",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b9",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b10",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b11",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b12",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b13",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b14",
"https://api.dicebear.com/7.x/adventurer/svg?seed=b15"
];

let avatars = [...girlAvatars, ...boyAvatars];

const grid = document.getElementById("grid");


document.getElementById("upload").addEventListener("change", function(e){

const file = e.target.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(event){

const text = event.target.result;
const rows = text.trim().split("\n");

let students = rows.map(r=>{
let [name,count] = r.split(",");
return {name:name.trim(), count:parseInt(count)||0};
});

renderStudents(students);

};

reader.readAsText(file);

});


function renderStudents(students){

grid.innerHTML="";

for(let i=0;i<32;i++){

if(i < students.length){

let s = students[i];
let avatar = avatars[i % avatars.length];

let card = document.createElement("div");
card.className="card";

card.innerHTML=`
<img class="avatar" src="${avatar}">
<div class="name">${s.name}</div>
<div class="count">${s.count}회</div>
`;

card.addEventListener("click",()=>{
s.count++;
card.querySelector(".count").innerText = s.count + "회";
});

grid.appendChild(card);

}else{
let empty = document.createElement("div");
empty.className="empty";
grid.appendChild(empty);
}

}

}

</script>

</body>
</html>
